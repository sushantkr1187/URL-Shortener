<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Not Found</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Inter',Georgia, 'Times New Roman', Times, serif;
        }

        body{
            font-family:Inter,sans-serif;
        
            background:#050505;
            color:white;
        
            min-height:100vh;
        
            display:flex;
            flex-direction:column;
        }
        /* NAVBAR */

        .navbar{
            width:90%;
            max-width:1200px;
            margin:20px auto;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 25px;
            background:rgba(12,12,12,0.85);
            border:1px solid rgba(255,255,255,0.05);
            border-radius:18px;
        }

        .logo{
            font-size:1.2rem;
            font-weight:700;
        }

        .logo img{
            height:52px;
            display:block;
        }

        .back-btn{
            color:#a1a1aa;
            text-decoration:none;
        }

        .back-btn:hover{
            color:white;
        }

        /* MAIN */

        .container{
            flex:1;
        
            display:flex;
            justify-content:center;
            align-items:center;
        
            padding:40px 20px;
        }

        .error404{
            width:100%;
            max-width:700px;
        
            background:#0f0f0f;
            border:1px solid #1f1f1f;
            border-radius:24px;
            padding:50px;
            text-align:center;
        }

        .erroricon{
            width:150px;
            height:150px;
        
            margin:auto;
        
            display:flex;
            justify-content:center;
            align-items:center;
        
            /* border-radius:50%; */
        
            font-size:2rem;
            font-weight:bold;
        
            /* background:linear-gradient(
                135deg,
                #2563eb,
                #10b981
            ); */
        
            margin-bottom:25px;
        }

        .create-btn{
            display:inline-block;
            margin-top:35px;
            text-decoration:none;
            color:white;
            font-weight:600;
            padding:14px 24px;
            border-radius:12px;
            background:linear-gradient(
                135deg,
                #2563eb,
                #10b981
            );
        }

        footer{
            text-align:center;
            padding:25px;
            color:#71717a;
        }

        .error404 h1{
            margin-bottom:15px;
        }

        .subtitle{
            color:#a1a1aa;
            /* margin-bottom:35px; */
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
             <!-- URL Shortener -->
        </div>

        <a href="/" class="back-btn">
            ← Home
        </a>
    </nav>

    <main class="container">
        <div class="error404">
            <div class="erroricon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
                </svg>
            </div>
            <h1>Error 404</h1>
            <h2>Short URL Not Found</h2>

            <p class="subtitle">
                <br> <br> The requested short URL does not exist or may have been removed.
            </p>

            <a href="/" class="create-btn">
                Create a New Shortened URL
            </a>
        </div>
    </main>

</body>
</html>
